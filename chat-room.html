<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - ShopEasy</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* Chat room specific styles */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background-color: var(--grey-100);
    }
    .msg-bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.85rem;
      line-height: 1.4;
      box-shadow: var(--shadow-sm);
    }
    .msg-bubble--sent {
      background-color: var(--primary);
      color: var(--white);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg-bubble--received {
      background-color: var(--white);
      color: var(--secondary);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--grey-200);
    }
    .msg-time {
      font-size: 0.65rem;
      opacity: 0.8;
      margin-top: 4px;
      text-align: right;
    }
    .chat-input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background-color: var(--white);
      border-top: 1px solid var(--grey-200);
    }
    .chat-input-field {
      flex: 1;
      padding: 10px 14px;
      background-color: var(--grey-100);
      border: 1.5px solid var(--grey-200);
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--secondary);
    }
    .chat-input-field:focus {
      background-color: var(--white);
      border-color: var(--primary);
    }
    .chat-send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background-color: var(--primary);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .chat-send-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="app-container" style="display: flex; flex-direction: column; height: 100vh;">
    <!-- Active Chat Header -->
    <header class="header">
      <button class="header__btn" onclick="location.href='messages.html'" style="display: flex;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h2 class="modal__title" id="chat-partner-name">Chatting...</h2>
      <div style="width: 22px;"></div> <!-- Spacer -->
    </header>

    <!-- Message Area -->
    <div class="chat-messages" id="messages-log">
      <!-- Injected chat messages bubble list -->
    </div>

    <!-- Input Bar -->
    <form class="chat-input-bar" id="chat-form">
      <input type="text" class="chat-input-field" placeholder="Type a message..." id="message-text" required autocomplete="off">
      <button type="submit" class="chat-send-btn" aria-label="Send Message">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      </button>
    </form>
  </div>

  <script type="module" src="js/pages/chat-room.js"></script>
</body>
</html>
