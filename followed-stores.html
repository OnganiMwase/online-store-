<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Followed Stores - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app-container">
    <!-- Header Bar -->
    <header class="header">
      <button class="header__btn" onclick="history.back()" style="display: flex;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h2 class="modal__title">Followed Stores</h2>
      <div style="width: 22px;"></div> <!-- Spacer -->
    </header>

    <main class="content">
      <div class="followed-stores-list" id="followed-stores-container" style="display: flex; flex-direction: column; gap: 12px;">
        <!-- Skeletons loader -->
        <div class="skeleton" style="width: 100%; height: 74px; border-radius: var(--radius);"></div>
        <div class="skeleton" style="width: 100%; height: 74px; border-radius: var(--radius);"></div>
      </div>
    </main>

    <div id="nav-container"></div>
  </div>

  <script type="module" src="/js/pages/followed-stores.js"></script>
</body>
</html>
