<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Products - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/seller.css">
  <style>
    /* Search & filter bars */
    .search-filter-bar {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .search-wrapper {
      position: relative;
    }
    .search-wrapper input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: 1.5px solid var(--grey-300);
      border-radius: var(--radius);
      font-size: 0.88rem;
    }
    .search-wrapper svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--grey-500);
      pointer-events: none;
    }
    .compact-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .compact-tab-btn {
      padding: 6px 14px;
      background: var(--grey-100);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--grey-700);
      border: 1.5px solid transparent;
      white-space: nowrap;
      cursor: pointer;
    }
    .compact-tab-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }

    /* Product Item Swipe Row list */
    .products-list-wrapper {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .swipe-container {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background-color: var(--grey-100);
    }
    .product-list-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--white);
      border: 1.5px solid var(--grey-200);
      border-radius: var(--radius);
      position: relative;
      z-index: 2;
      transition: transform 0.25s ease-out;
      transform: translateX(0);
    }
    .product-list-card img {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      flex-shrink: 0;
    }
    .product-card-details {
      flex: 1;
      min-width: 0;
    }
    .product-card-title {
      font-size: 0.88rem;
      font-weight: 800;
      color: var(--secondary);
      line-height: 1.3;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-card-price {
      font-size: 0.9rem;
      font-weight: 850;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .product-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .product-stock-badge {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--grey-600);
    }
    .product-status-tag {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .status-active { background: #E8F5E9; color: #2E7D32; }
    .status-draft { background: #ECEFF1; color: #455A64; }
    .status-outofstock { background: #FFEBEE; color: #C62828; }
    .status-inactive { background: #FFF3E0; color: #EF6C00; }

    /* Swipe-reveal behind card actions */
    .swipe-actions-underlay {
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 140px;
      display: flex;
      z-index: 1;
    }
    .underlay-btn {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 0.72rem;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
    .underlay-edit {
      background: var(--secondary);
    }
    .underlay-delete {
      background: var(--danger);
    }

    /* Modal Styling for Deletion/Deactivation Confirmation */
    .custom-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .custom-modal-content {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 850;
      color: var(--secondary);
      margin-bottom: 12px;
    }
    .modal-desc {
      font-size: 0.85rem;
      color: var(--grey-600);
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .modal-btns {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    
    <!-- SELLER HEADER -->
    <header class="seller-header">
      <div class="seller-brand" onclick="location.href='dashboard.html'" style="cursor: pointer;">
        <div class="seller-logo">←</div>
        <span class="seller-title">My Products</span>
      </div>
      <div class="seller-actions">
        <button class="btn btn--primary btn--sm" onclick="location.href='add-product.html'" style="padding: 6px 12px; font-size: 0.8rem; font-weight: 800;">
          ＋ Add
        </button>
      </div>
    </header>

    <main class="content" style="padding: 16px 12px 30px 12px;">
      
      <!-- Search & Filters -->
      <div class="search-filter-bar">
        <div class="search-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" id="products-search-input" placeholder="Search my listings by title...">
        </div>
        <div class="compact-tabs">
          <div class="compact-tab-btn active" data-tab="all">All</div>
          <div class="compact-tab-btn" data-tab="active">Active</div>
          <div class="compact-tab-btn" data-tab="draft">Draft</div>
          <div class="compact-tab-btn" data-tab="outofstock">Out of Stock</div>
        </div>
      </div>

      <!-- Products container -->
      <div class="products-list-wrapper" id="products-list-container">
        <!-- Skeleton fallback -->
        <div class="skeleton" style="width: 100%; height: 96px; border-radius: var(--radius);"></div>
        <div class="skeleton" style="width: 100%; height: 96px; border-radius: var(--radius); margin-top: 10px;"></div>
      </div>

    </main>

    <!-- Custom Dialog Modal for Delete/Deactivate Flow -->
    <div class="custom-modal" id="delete-flow-modal">
      <div class="custom-modal-content">
        <div class="modal-title" id="modal-title-el">Delete Product?</div>
        <div class="modal-desc" id="modal-desc-el">This product has active or previous orders. Are you sure you want to deactivate it instead of deleting it permanently?</div>
        <div class="modal-btns" id="modal-btns-container">
          <!-- Dynamic action buttons here -->
        </div>
      </div>
    </div>

    <!-- Navigation spacer -->
    <div style="height: 60px;"></div>
  </div>

  <script type="module" src="/js/pages/seller-products.js"></script>
</body>
</html>
