<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Onboarding - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app-container">
    <!-- Header Bar -->
    <header class="header">
      <button class="header__btn" onclick="location.href='/account.html'" style="display: flex;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h2 class="modal__title">Setup Your Store</h2>
      <div style="width: 22px;"></div> <!-- Spacer -->
    </header>

    <main class="content">
      <div style="text-align: center; padding: 12px 16px;">
        <span style="font-size: 2.2rem;">🏪</span>
        <h1 style="font-size: 1.3rem; font-weight: 800; color: var(--secondary); margin-top: 8px;">Start Selling on ShopEasy</h1>
        <p style="font-size: 0.85rem; color: var(--grey-600); margin-top: 4px; line-height: 1.4;">Reach thousands of eager buyers in Blantyre, Lilongwe, Mzuzu, Zomba and surrounding districts across Malawi.</p>
      </div>

      <form id="seller-setup-form" style="margin-top: 16px;">
        <div class="card" style="padding: 14px; display: flex; flex-direction: column; gap: 12px;">
          <div class="form-group">
            <label class="form-label" for="store-name">Store Name / Business Name</label>
            <input type="text" id="store-name" class="form-input" placeholder="e.g. Phiri Electronics" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="store-description">Business Description</label>
            <textarea id="store-description" class="form-textarea" placeholder="Tell buyers what you specialize in selling..." required></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="store-phone">Customer Contact Phone</label>
            <input type="tel" id="store-phone" class="form-input" placeholder="e.g. +265 888 12 34 56" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="store-city">Primary City Location</label>
            <select id="store-city" class="form-select" required>
              <option value="Lilongwe">Lilongwe</option>
              <option value="Blantyre">Blantyre</option>
              <option value="Mzuzu">Mzuzu</option>
              <option value="Zomba">Zomba</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn--primary btn--full" style="margin-top: 16px;" id="setup-submit-btn">Initialize My Store</button>
      </form>
    </main>
  </div>

  <script type="module" src="/js/pages/seller-setup.js"></script>
</body>
</html>
