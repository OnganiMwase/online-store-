<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    /* Messaging layouts */
    .convo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .convo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background-color: var(--white);
      border: 1.5px solid var(--grey-200);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
    }
    .convo-item--unread {
      border-color: var(--primary);
      background-color: var(--primary-light);
    }
    .convo-item__avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background-color: var(--grey-200);
      object-fit: cover;
    }
    .convo-item__info {
      flex: 1;
      min-width: 0;
    }
    .convo-item__title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .convo-item__time {
      font-size: 0.7rem;
      color: var(--grey-400);
      font-weight: 400;
    }
    .convo-item__msg {
      font-size: 0.8rem;
      color: var(--grey-600);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .convo-item__unread-dot {
      width: 8px;
      height: 8px;
      background-color: var(--primary);
      border-radius: 50%;
      position: absolute;
      right: 12px;
      bottom: 12px;
    }
    .convo-item__product {
      font-size: 0.7rem;
      background-color: var(--grey-100);
      color: var(--grey-800);
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 4px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div id="header-container"></div>

    <main class="content">
      <h1 class="page-title" style="font-size: 1.3rem; font-weight: 700; margin-bottom: 16px; color: var(--secondary);">Chat Messages</h1>

      <!-- Conversations container list -->
      <div class="convo-list" id="conversations-container">
        <!-- Skeleton structures -->
        <div class="skeleton" style="width: 100%; height: 72px; border-radius: var(--radius);"></div>
        <div class="skeleton" style="width: 100%; height: 72px; border-radius: var(--radius);"></div>
      </div>
    </main>

    <div id="nav-container"></div>
  </div>

  <script type="module" src="/js/pages/messages.js"></script>
</body>
</html>
