<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/messages.css">
</head>
<body>
  <div class="app-container" style="padding-bottom: 80px;">
    <!-- Header Bar -->
    <header class="header">
      <div style="width: 22px;"></div> <!-- Spacer -->
      <h2 class="modal__title">Messages</h2>
      <div style="width: 22px;"></div> <!-- Spacer -->
    </header>

    <main class="content">
      <div class="messages-container">
        <!-- Pinned Notifications Section -->
        <div id="pinned-notifications-container"></div>

        <!-- Conversations container list -->
        <div class="convo-list" id="conversations-container">
          <!-- Skeleton structures -->
          <div class="skeleton" style="width: 100%; height: 72px; border-radius: var(--radius);"></div>
          <div class="skeleton" style="width: 100%; height: 72px; border-radius: var(--radius);"></div>
        </div>
      </div>
    </main>

    <div id="nav-container"></div>
  </div>

  <script type="module" src="/js/pages/messages.js"></script>
</body>
</html>
