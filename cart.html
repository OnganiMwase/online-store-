<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/cart.css">
</head>
<body>
  <div class="app-container">
    <div id="header-container"></div>

    <main class="content">
      <h1 class="page-title" style="font-size: 1.3rem; font-weight: 700; margin-bottom: 16px; color: var(--secondary);">Shopping Cart</h1>

      <!-- Cart Items Container -->
      <div class="cart-items-list" id="cart-items-container">
        <!-- Skeleton dynamic loader -->
        <div class="skeleton" style="width: 100%; height: 90px; border-radius: var(--radius); margin-bottom: 12px;"></div>
        <div class="skeleton" style="width: 100%; height: 90px; border-radius: var(--radius); margin-bottom: 12px;"></div>
      </div>

      <!-- Price Breakdown Panel -->
      <div class="cart-summary-panel" id="cart-summary" style="display: none;">
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="cart-subtotal">MWK 0</span>
        </div>
        <div class="summary-row">
          <span>Estimated Delivery</span>
          <span style="color: var(--success); font-weight: 600;">FREE</span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-row summary-row--total">
          <span>Total Order Value</span>
          <span id="cart-total" style="color: var(--primary); font-size: 1.15rem; font-weight: 800;">MWK 0</span>
        </div>
        
        <button class="btn btn--primary btn--full" style="margin-top: 16px;" id="checkout-btn">
          Proceed to Checkout
        </button>
      </div>
    </main>

    <div id="nav-container"></div>
  </div>

  <script type="module" src="/js/pages/cart.js"></script>
</body>
</html>
