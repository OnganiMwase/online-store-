<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Shopping Cart - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/cart.css">
</head>
<body>
  <div class="app-container">
    <!-- Custom Cart Top Bar -->
    <header class="header" id="cart-header">
      <div class="header__left">
        <h2 class="modal__title" style="display: flex; align-items: center; gap: 6px;" id="cart-header-title">
          <span>🛒 Cart (0)</span>
        </h2>
      </div>
      <div class="header__right" style="display: flex; align-items: center; gap: 12px;">
        <span class="location-badge" style="font-size: 0.8rem; font-weight: 600; color: var(--grey-800); background: var(--grey-100); padding: 4px 10px; border-radius: 100px; display: flex; align-items: center; gap: 4px; border: 1px solid var(--grey-200);">
          <span>📍 Malawi</span>
          <span style="font-size: 0.9rem;">🇲🇼</span>
        </span>
        <button id="clear-all-btn" class="clear-all-button" style="background: none; font-size: 0.8rem; font-weight: 700; color: var(--primary); cursor: pointer; transition: opacity 0.15s; display: none;">
          🗑️ Clear all
        </button>
      </div>
    </header>

    <main class="content" style="padding-bottom: 90px; padding-top: 16px;">
      <!-- Main Loading Spinner -->
      <div id="cart-loader" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0;">
        <span class="spinner"></span>
        <p style="font-size: 0.85rem; color: var(--grey-600); margin-top: 12px;">Syncing your cart...</p>
      </div>

      <!-- Empty Cart State -->
      <div id="cart-empty-state" style="display: none; animation: fadeIn 0.25s ease-out;">
        <div style="text-align: center; padding: 48px 16px; display: flex; flex-direction: column; align-items: center; gap: 16px;">
          <div class="empty-state__icon" style="font-size: 4rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); line-height: 1;">🛒</div>
          <h3 class="empty-state__title" style="font-size: 1.3rem; font-weight: 800; color: var(--secondary); margin-top: 8px;">Your cart is empty</h3>
          <p class="empty-state__message" style="font-size: 0.9rem; max-width: 280px; line-height: 1.5; color: var(--grey-600);">Start shopping to add items</p>
          <a href="shop.html" class="btn btn--primary" style="margin-top: 12px; font-weight: 700; padding: 12px 28px; border-radius: var(--radius); background-color: var(--primary); color: var(--white); box-shadow: var(--shadow-md);">
            Browse Products
          </a>
          <div style="display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--grey-600); margin-top: 24px; background: var(--grey-100); padding: 8px 16px; border-radius: 100px; border: 1px dashed var(--grey-400);">
            <span>🔒 Payments secured by Paychangu</span>
          </div>
        </div>
      </div>

      <!-- Active Cart Items List -->
      <div id="cart-items-container" class="cart-items-list" style="display: none;">
        <!-- Grouped store structures will be injected here dynamically -->
      </div>
    </main>

    <!-- Sticky Bottom Summary Card -->
    <div id="cart-summary-sticky" class="cart-summary-sticky" style="display: none;">
      <div class="summary-sticky-container">
        <label class="select-all-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;">
          <input type="checkbox" id="select-all-checkbox" class="custom-checkbox" checked>
          <span style="font-size: 0.85rem; font-weight: 700; color: var(--grey-800);">Select All</span>
        </label>
        
        <div class="summary-sticky-right" style="display: flex; flex-direction: column; align-items: flex-end; gap: 2px;">
          <div style="font-size: 0.75rem; color: var(--grey-600); font-weight: 600;">Total Selected Value</div>
          <div id="sticky-total-price" style="font-size: 1.15rem; font-weight: 800; color: var(--primary);">MWK 0</div>
        </div>
      </div>
      
      <button id="sticky-checkout-btn" class="btn btn--primary btn--full" style="margin-top: 12px; font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 14px 20px; box-shadow: 0 4px 14px rgba(229, 57, 53, 0.25);">
        <span>Checkout (0 selected)</span>
      </button>
    </div>

    <!-- Bottom navigation bar -->
    <div id="nav-container"></div>
  </div>

  <script type="module" src="/js/pages/cart.js"></script>
</body>
</html>
