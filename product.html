<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/product.css">
</head>
<body>
  <div class="app-container">
    <!-- Back Header Bar -->
    <header class="header">
      <button class="header__btn" onclick="history.back()" style="display: flex;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h2 class="modal__title">Product Details</h2>
      <button class="header__btn" id="share-btn" style="display: flex;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-share-2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
    </header>

    <main class="content" style="padding-bottom: 100px;" id="product-details-container">
      <!-- Injected by JavaScript -->
      <div class="skeleton-detail" style="display: flex; flex-direction: column; gap: 16px;">
        <div class="skeleton" style="width: 100%; aspect-ratio: 1; border-radius: var(--radius);"></div>
        <div class="skeleton" style="width: 60%; height: 24px;"></div>
        <div class="skeleton" style="width: 30%; height: 18px;"></div>
        <div class="skeleton" style="width: 100%; height: 80px;"></div>
      </div>
    </main>

    <!-- Bottom Action Button Panel (Sticky) -->
    <div class="product-actions-bar" id="actions-bar" style="display: none;">
      <button class="btn btn--outline" id="wishlist-action-btn" aria-label="Wishlist">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-heart"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
      </button>
      <button class="btn btn--secondary" id="chat-action-btn" style="flex: 1;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-message-circle"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
        Chat Seller
      </button>
      <button class="btn btn--primary" id="add-cart-btn" style="flex: 1.2;">
        Add to Cart
      </button>
    </div>

    <!-- Contact / Chat Seller Modal -->
    <div class="modal" id="contact-modal">
      <div class="modal__container">
        <div class="modal__header">
          <h3 class="modal__title">Send Message</h3>
          <span class="modal__close" data-close>&times;</span>
        </div>
        <form id="contact-form">
          <div class="form-group">
            <label class="form-label" for="contact-msg">Your Message</label>
            <textarea id="contact-msg" class="form-textarea" placeholder="Is this still available?" required></textarea>
          </div>
          <button type="submit" class="btn btn--primary btn--full" id="contact-submit-btn">Send Message</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="/js/pages/product.js"></script>
</body>
</html>
