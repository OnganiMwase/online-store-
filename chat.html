<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - ShopEasy</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/messages.css">
</head>
<body>
  <div class="app-container chat-app-layout">
    
    <!-- Active Chat Header -->
    <header class="header" style="justify-content: space-between;">
      <button class="header__btn" id="chat-back-btn" style="display: flex; align-items: center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      
      <div class="chat-header-info">
        <img id="chat-partner-avatar" src="https://api.dicebear.com/7.x/initials/svg?seed=User" alt="Avatar" class="chat-header-avatar" referrerPolicy="no-referrer">
        <div class="chat-header-meta">
          <span class="chat-header-name" id="chat-partner-name">Loading...</span>
          <span class="chat-header-status chat-header-status--offline" id="chat-partner-status">
            <span class="status-dot status-dot--offline"></span> Offline
          </span>
        </div>
      </div>
      
      <div style="width: 22px;"></div> <!-- Spacer -->
    </header>

    <!-- Expandable Order/Product Context Card -->
    <div class="order-ref-card hidden" id="order-ref-card">
      <div class="order-ref-header" id="order-ref-toggle">
        <span class="order-ref-title" id="order-ref-summary">🏷️ Product Context</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="order-ref-chevron"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="order-ref-body hidden" id="order-ref-details-panel">
        <img src="" alt="Product" class="order-ref-img" id="order-ref-image">
        <div class="order-ref-details">
          <span id="order-ref-name" style="font-size: 0.85rem; font-weight: 700; color: var(--secondary);">Product Name</span>
          <span id="order-ref-price" style="font-size: 0.8rem; font-weight: 800; color: var(--primary);">MWK 0.00</span>
          <a href="#" id="order-ref-link" style="font-size: 0.72rem; font-weight: 700; color: var(--primary); text-decoration: underline; margin-top: 2px;">View product details</a>
        </div>
      </div>
    </div>

    <!-- Message Scroll Area -->
    <div class="messages-scroller" id="messages-log">
      <!-- Loading skeletons -->
      <div style="text-align: center; padding: 20px; color: var(--grey-600); font-weight: 500;">
        <span class="spinner" style="width: 20px; height: 20px; margin-right: 8px; vertical-align: middle;"></span> Loading messages...
      </div>
    </div>

    <!-- Bottom Input Area -->
    <div class="chat-bottom-wrapper">
      
      <!-- Upload progress bar -->
      <div class="upload-progress-bar hidden" id="upload-progress-container">
        <div class="upload-progress-fill" id="upload-progress-fill"></div>
      </div>

      <!-- Image preview before sending -->
      <div class="chat-upload-preview hidden" id="chat-upload-preview">
        <img src="" alt="Selected Media" class="chat-upload-img" id="chat-upload-preview-img">
        <div class="chat-upload-cancel" id="chat-upload-cancel">×</div>
      </div>

      <!-- Main Input Controls Form -->
      <form class="chat-input-row" id="chat-form" onsubmit="return false;">
        <!-- Camera trigger input -->
        <input type="file" id="chat-file-input" accept="image/*" class="hidden">
        <button type="button" class="chat-attach-btn" id="chat-attach-btn" aria-label="Attach photo">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-camera"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        </button>

        <!-- Message typing box -->
        <textarea class="chat-textarea" id="message-text" placeholder="Message seller..." rows="1" autocomplete="off"></textarea>

        <!-- Action submit trigger -->
        <button type="button" class="chat-submit-btn chat-submit-btn--inactive" id="chat-send-btn" aria-label="Send message">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        </button>
      </form>
    </div>

    <!-- Lightbox Overlay Modal -->
    <div class="lightbox-modal" id="lightbox-modal">
      <div class="lightbox-close" id="lightbox-close">×</div>
      <img src="" alt="Full preview" class="lightbox-img" id="lightbox-img" referrerPolicy="no-referrer">
    </div>

  </div>

  <script type="module" src="js/pages/chat.js"></script>
</body>
</html>
