<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - ShopEasy</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/account.css">
</head>
<body>
  <div class="app-container">
    <div id="header-container"></div>

    <main class="content" id="main-content">
      <!-- Dynamic loading state / skeletons -->
      <div id="account-loading" style="padding: 40px 0; text-align: center;">
        <div class="skeleton" style="width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px;"></div>
        <div class="skeleton" style="width: 140px; height: 20px; margin: 0 auto 10px;"></div>
        <div class="skeleton" style="width: 180px; height: 16px; margin: 0 auto 24px;"></div>
        <div class="skeleton" style="width: 100%; height: 50px; border-radius: var(--radius); margin-bottom: 12px;"></div>
        <div class="skeleton" style="width: 100%; height: 50px; border-radius: var(--radius);"></div>
      </div>

      <!-- Auth Container (Populated by JS) -->
      <div id="account-container" style="display: none;"></div>
    </main>

    <!-- Hidden file input for Avatar selection -->
    <input type="file" id="avatar-file-input" accept="image/*" style="display: none;">

    <!-- Beautiful, clean Custom Confirmation Modal -->
    <div class="confirm-overlay" id="logout-confirm-modal">
      <div class="confirm-box">
        <h3 class="confirm-title" data-i18n="signOut">Sign Out</h3>
        <p class="confirm-desc">Sign out of ShopEasy?</p>
        <div class="confirm-actions">
          <button class="confirm-btn confirm-btn--cancel" id="logout-cancel-btn" data-i18n="cancel">Cancel</button>
          <button class="confirm-btn confirm-btn--danger" id="logout-confirm-btn">Sign Out</button>
        </div>
      </div>
    </div>

    <div id="nav-container"></div>
  </div>

  <script type="module" src="js/pages/account.js"></script>
</body>
</html>
