<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEasy - Local Malawian Online Marketplace</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/home.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <div class="app-container">
    <div id="header-container"></div>
    
    <main class="content">
      <!-- Search Bar Banner -->
      <div class="hero-banner">
        <h1 class="hero-banner__title">Local Marketplace</h1>
        <p class="hero-banner__subtitle">Discover trusted local sellers across Malawi</p>
        <form class="hero-banner__search-form" id="search-form">
          <input type="text" class="hero-banner__search-input" placeholder="What are you looking for today?" id="search-input" required>
          <button type="submit" class="hero-banner__search-btn" aria-label="Search">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </button>
        </form>
      </div>

      <!-- Categories Section -->
      <section class="section">
        <div class="section__header">
          <h2 class="section__title">Browse Categories</h2>
          <a href="/shop.html" class="section__link">See All</a>
        </div>
        <div class="categories-list horizontal-scroll" id="categories-container">
          <!-- Categories will be dynamically rendered -->
          <div class="skeleton-category skeleton" style="width: 70px; height: 70px; border-radius: 50%;"></div>
          <div class="skeleton-category skeleton" style="width: 70px; height: 70px; border-radius: 50%;"></div>
          <div class="skeleton-category skeleton" style="width: 70px; height: 70px; border-radius: 50%;"></div>
          <div class="skeleton-category skeleton" style="width: 70px; height: 70px; border-radius: 50%;"></div>
        </div>
      </section>

      <!-- Promoted / Latest Products Section -->
      <section class="section">
        <div class="section__header">
          <h2 class="section__title">Latest Arrivals</h2>
          <a href="/shop.html" class="section__link">View All</a>
        </div>
        <div class="grid-2" id="products-container">
          <!-- Products will be dynamically rendered -->
        </div>
      </section>
    </main>

    <div id="nav-container"></div>
  </div>

  <script type="module" src="/js/pages/home.js"></script>
</body>
</html>
