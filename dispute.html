<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report a Problem - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/orders.css">
</head>
<body>
  <div class="app-container">
    <!-- Header Bar -->
    <header class="header">
      <button class="header__btn" id="dispute-back-btn" style="display: flex;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h2 class="modal__title">Report a Problem</h2>
      <div style="width: 22px;"></div> <!-- Spacer -->
    </header>

    <main class="content" style="padding: 16px 16px 80px; overflow-y: auto;">
      <div id="dispute-form-container">
        <!-- Order recap card (rendered dynamically) -->
        <div class="skeleton" style="width: 100%; height: 90px; border-radius: var(--radius); margin-bottom: 20px;"></div>

        <!-- Form itself -->
        <form id="dispute-form" class="card" style="padding: 16px; display: flex; flex-direction: column; gap: 16px;">
          <!-- Reason Selection -->
          <div class="form-group">
            <label style="font-size: 0.8rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; margin-bottom: 8px; display: block;">1. Select Reason *</label>
            <div style="display: flex; flex-direction: column; gap: 8px; padding-left: 2px;">
              <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer;">
                <input type="radio" name="dispute-reason" value="wrong_item" required style="accent-color: var(--primary); width: 16px; height: 16px;"> Wrong item received
              </label>
              <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer;">
                <input type="radio" name="dispute-reason" value="damaged" style="accent-color: var(--primary); width: 16px; height: 16px;"> Item arrived damaged
              </label>
              <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer;">
                <input type="radio" name="dispute-reason" value="not_described" style="accent-color: var(--primary); width: 16px; height: 16px;"> Item not as described
              </label>
              <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer;">
                <input type="radio" name="dispute-reason" value="not_received" style="accent-color: var(--primary); width: 16px; height: 16px;"> Item never received
              </label>
              <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer;">
                <input type="radio" name="dispute-reason" value="changed_mind" style="accent-color: var(--primary); width: 16px; height: 16px;"> I changed my mind
              </label>
            </div>
          </div>

          <!-- Description Textarea -->
          <div class="form-group">
            <label for="dispute-desc" style="font-size: 0.8rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; margin-bottom: 4px; display: block;">2. Describe your issue *</label>
            <textarea id="dispute-desc" class="form-input" placeholder="Please explain in detail what's wrong with your order (minimum 30 characters)..." style="width: 100%; height: 110px; border-radius: 8px; border: 1.5px solid var(--grey-400); padding: 10px; font-size: 0.8rem; resize: none;" required></textarea>
            <div style="display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--grey-600); font-weight: 700; margin-top: 4px;">
              <span id="dispute-desc-error" style="color: var(--danger);"></span>
              <span id="dispute-desc-counter">0/1000</span>
            </div>
          </div>

          <!-- Photos Uploader -->
          <div class="form-group">
            <label style="font-size: 0.8rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; margin-bottom: 2px; display: block;">3. Attach proof photos (optional, max 5)</label>
            <p style="font-size: 0.7rem; color: var(--grey-600); margin-bottom: 8px; font-weight: 600;">Adding images of the shipping label and the product helps expedite reviews.</p>
            
            <div class="photo-uploader-grid" id="photos-grid">
              <!-- Grid items and uploader button are dynamically handled -->
              <label class="photo-upload-trigger" id="upload-trigger">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                <span>Add Photo</span>
                <input type="file" id="dispute-file-input" multiple accept="image/*" class="hidden">
              </label>
            </div>

            <!-- Upload progress bar container -->
            <div class="upload-progress-bar" id="dispute-progress-bar">
              <div class="upload-progress-fill" id="dispute-progress-fill"></div>
            </div>
          </div>

          <!-- Preferred Resolution -->
          <div class="form-group">
            <label for="dispute-resolution" style="font-size: 0.8rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; margin-bottom: 4px; display: block;">4. Preferred Resolution *</label>
            <select id="dispute-resolution" class="form-select" style="width: 100%; padding: 12px; border-radius: 8px; border: 1.5px solid var(--grey-400); font-size: 0.85rem; font-weight: 700; color: var(--secondary);">
              <option value="Full Refund">Full Refund</option>
              <option value="Partial Refund">Partial Refund</option>
              <option value="Replacement">Replacement</option>
            </select>
          </div>

          <!-- Submit button -->
          <button type="submit" class="btn btn--primary btn--full" id="dispute-submit-btn" style="padding: 12px; font-weight: 800; margin-top: 4px;">Submit Report</button>
        </form>
      </div>
    </main>

    <div id="nav-container"></div>
  </div>

  <script type="module" src="/js/pages/dispute.js"></script>
</body>
</html>
