<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ShopEasy</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body class="auth-page">

  <div class="auth-container" id="login-container">
    
    <div class="auth-logo">
      <span class="logo-box">SE</span>
      <span class="logo-text">ShopEasy</span>
      <span class="logo-flag">🇲🇼</span>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your ShopEasy account</p>

    <form id="loginForm" class="auth-form" novalidate>
      
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" 
          name="email" placeholder="yourname@gmail.com" 
          autocomplete="email" required>
        <span class="form-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-with-icon">
          <input class="form-input" type="password" id="password"
            name="password" placeholder="Enter your password"
            autocomplete="current-password" required>
          <button type="button" class="toggle-password" 
            id="togglePassword" aria-label="Show password">
            👁️
          </button>
        </div>
        <span class="form-error" id="passwordError"></span>
      </div>

      <div class="auth-form-footer">
        <a href="forgot-password.html" class="link">
          Forgot password?
        </a>
      </div>

      <button type="submit" class="btn btn--primary btn--full" 
        id="loginBtn">
        Sign In
      </button>

    </form>

    <div class="auth-divider">
      <span>or continue with</span>
    </div>

    <button class="btn btn--outline btn--full btn--google" 
      id="googleBtn">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.92h6.69c-.29 1.5-1.14 2.77-2.4 3.61v3h3.86c2.26-2.08 3.59-5.14 3.59-8.46z"/>
        <path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.86-3c-1.08.72-2.45 1.16-4.07 1.16-3.13 0-5.78-2.11-6.73-4.96H1.33v3.1A11.98 11.98 0 0 0 12 24z"/>
        <path fill="#FBBC05" d="M5.27 14.29a7.22 7.22 0 0 1 0-4.58V6.61H1.33a11.98 11.98 0 0 0 0 10.78l3.94-3.1z"/>
        <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0A11.98 11.98 0 0 0 1.33 6.61L5.27 9.71c.95-2.85 3.6-4.96 6.73-4.96z"/>
      </svg>
      Continue with Google
    </button>

    <p class="auth-switch">
      Don't have an account? 
      <a href="register.html" class="link link--primary">
        Create one free
      </a>
    </p>

  </div>

  <script type="module" src="js/pages/login.js"></script>
</body>
</html>
