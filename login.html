<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/auth.css">
</head>
<body>
  <div class="app-container">
    <div class="auth-header">
      <a href="/index.html" class="auth-header__logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-store"><path d="m2 7 4.41-3.67A2 2 0 0 1 7.73 3h8.54a2 2 0 0 1 1.32.53L22 7"/><path d="M4 12V7"/><path d="M12 12V7"/><path d="M20 12V7"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M14 12H10"/></svg>
        <span>ShopEasy</span>
      </a>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your local Malawian marketplace account</p>
    </div>

    <main class="content">
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="e.g. name@domain.com" required autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn--primary btn--full" id="login-submit-btn">Sign In</button>
      </form>

      <div class="auth-divider">
        <span>or continue with</span>
      </div>

      <button class="btn btn--outline btn--full" id="google-signin-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chrome"><circle cx="12" cy="12" r="10"/><path d="M12 12a1 1 0 0 1 1-1h9.1c.3 1 .4 2 .4 3a9 9 0 0 1-1.2 4.4L15.4 12z"/></svg>
        Sign in with Google
      </button>

      <div class="auth-footer">
        <p>Don't have an account? <a href="/register.html" class="auth-link">Create Account</a></p>
      </div>
    </main>
  </div>

  <script type="module" src="/js/pages/login.js"></script>
</body>
</html>
