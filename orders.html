<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/orders.css">
</head>
<body>
  <div class="app-container">
    <!-- Header Bar -->
    <header class="header">
      <button class="header__btn" onclick="location.href='/account.html'" style="display: flex;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h2 class="modal__title">My Orders</h2>
      <div style="width: 22px;"></div> <!-- Spacer -->
    </header>

    <!-- Tabs Container -->
    <div class="orders-tabs" id="orders-tabs">
      <button class="orders-tab orders-tab--active" data-status="all">All</button>
      <button class="orders-tab" data-status="pending_payment">To Pay</button>
      <button class="orders-tab" data-status="processing">Processing</button>
      <button class="orders-tab" data-status="ready">Ready</button>
      <button class="orders-tab" data-status="completed">Completed</button>
      <button class="orders-tab" data-status="cancelled">Cancelled</button>
      <button class="orders-tab" data-status="dispute_open">Returns</button>
    </div>

    <main class="content">
      <div class="orders-list-container" id="orders-list">
        <!-- Skeleton dynamic loader -->
        <div class="skeleton" style="width: 100%; height: 120px; border-radius: var(--radius); margin-bottom: 12px;"></div>
        <div class="skeleton" style="width: 100%; height: 120px; border-radius: var(--radius); margin-bottom: 12px;"></div>
      </div>

      <!-- Load More Container -->
      <div class="load-more-container hidden" id="load-more-container">
        <button class="btn btn--outline" id="load-more-btn">Load More</button>
      </div>
    </main>

    <div id="nav-container"></div>
  </div>

  <script type="module" src="/js/pages/orders.js"></script>
</body>
</html>
