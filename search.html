<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Results - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/shop.css">
</head>
<body>
  <div class="app-container">
    <!-- Back Header Bar -->
    <header class="header">
      <button class="header__btn" onclick="history.back()" style="display: flex;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <div class="shop-search" style="flex: 1; margin: 0 10px;">
        <input type="text" id="search-results-input" placeholder="Search products...">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shop-search-icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
    </header>

    <main class="content">
      <div style="font-size: 0.85rem; font-weight: 600; color: var(--grey-600); margin-bottom: 16px;" id="search-status">Searching for items...</div>

      <!-- Search results product grid -->
      <div class="grid-2" id="search-products-grid">
        <!-- Injected cards -->
      </div>
    </main>

    <div id="nav-container"></div>
  </div>

  <script type="module" src="/js/pages/search.js"></script>
</body>
</html>
