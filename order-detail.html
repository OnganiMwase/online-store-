<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Details - ShopEasy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages/orders.css">
</head>
<body>
  <div class="app-container">
    <!-- Header Bar -->
    <header class="header">
      <button class="header__btn" onclick="location.href='/orders.html'" style="display: flex;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h2 class="modal__title">Order Details</h2>
      <div style="width: 22px;"></div> <!-- Spacer -->
    </header>

    <main class="content" id="order-details-content" style="padding-bottom: 80px; overflow-y: auto;">
      <!-- Skeleton Loading State -->
      <div style="padding: 16px;">
        <div class="skeleton" style="width: 60%; height: 24px; border-radius: 4px; margin-bottom: 12px;"></div>
        <div class="skeleton" style="width: 100%; height: 160px; border-radius: var(--radius); margin-bottom: 16px;"></div>
        <div class="skeleton" style="width: 100%; height: 100px; border-radius: var(--radius); margin-bottom: 16px;"></div>
        <div class="skeleton" style="width: 100%; height: 120px; border-radius: var(--radius);"></div>
      </div>
    </main>

    <div id="nav-container"></div>
  </div>

  <script type="module" src="/js/pages/order-detail.js"></script>
</body>
</html>
