<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — ShopEasy</title>
  <link class="auth-css" rel="stylesheet" href="css/main.css">
  <link class="auth-css" rel="stylesheet" href="css/layout.css">
  <link class="auth-css" rel="stylesheet" href="css/pages/auth.css">
</head>
<body class="auth-page">

  <div class="auth-container" id="register-container">
    
    <div class="auth-logo">
      <span class="logo-box">SE</span>
      <span class="logo-text">ShopEasy</span>
      <span class="logo-flag">🇲🇼</span>
    </div>

    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Join thousands of Malawian buyers and sellers</p>

    <form id="registerForm" class="auth-form" novalidate>
      
      <div class="form-group">
        <label class="form-label" for="name">Full Name*</label>
        <input class="form-input" type="text" id="name" 
          name="name" placeholder="John Phiri" 
          autocomplete="name" required>
        <span class="form-error" id="nameError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address*</label>
        <input class="form-input" type="email" id="email" 
          name="email" placeholder="johnphiri@gmail.com" 
          autocomplete="email" required>
        <span class="form-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="phone">Phone Number</label>
        <input class="form-input" type="tel" id="phone" 
          name="phone" placeholder="+265 888 12 34 56" 
          autocomplete="tel">
        <span class="form-error" id="phoneError"></span>
      </div>

      <div class="form-group">
        <label class="form-label">I want to*</label>
        <div class="role-selector" id="roleSelector">
          <div class="role-option role-option--selected" data-role="buyer" id="roleBuyer">
            <div class="role-card">
              <span class="role-icon">🛍️</span>
              <span class="role-title">I want to Buy</span>
            </div>
          </div>
          <div class="role-option" data-role="seller" id="roleSeller">
            <div class="role-card">
              <span class="role-icon">🏪</span>
              <span class="role-title">I want to Sell</span>
            </div>
          </div>
        </div>
        <input type="hidden" id="role" name="role" value="buyer">
        <span class="form-error" id="roleError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="city">City / Location*</label>
        <select class="form-input" id="city" name="city" required>
          <option value="" disabled selected>Select your city</option>
          <option value="Lilongwe">Lilongwe</option>
          <option value="Blantyre">Blantyre</option>
          <option value="Mzuzu">Mzuzu</option>
          <option value="Zomba">Zomba</option>
          <option value="Kasungu">Kasungu</option>
          <option value="Mangochi">Mangochi</option>
          <option value="Dedza">Dedza</option>
          <option value="Salima">Salima</option>
          <option value="Karonga">Karonga</option>
          <option value="Balaka">Balaka</option>
          <option value="Liwonde">Liwonde</option>
          <option value="Ntcheu">Ntcheu</option>
          <option value="Mulanje">Mulanje</option>
          <option value="Chiradzulu">Chiradzulu</option>
          <option value="Thyolo">Thyolo</option>
          <option value="Rumphi">Rumphi</option>
          <option value="Other">Other</option>
        </select>
        <span class="form-error" id="cityError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password*</label>
        <div class="input-with-icon">
          <input class="form-input" type="password" id="password"
            name="password" placeholder="Min 8 chars, 1 uppercase, 1 number"
            autocomplete="new-password" required>
          <button type="button" class="toggle-password" 
            id="togglePassword" aria-label="Show password">
            👁️
          </button>
        </div>
        <span class="form-error" id="passwordError"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password*</label>
        <div class="input-with-icon">
          <input class="form-input" type="password" id="confirmPassword"
            name="confirmPassword" placeholder="Confirm your password"
            autocomplete="new-password" required>
          <button type="button" class="toggle-password" 
            id="toggleConfirmPassword" aria-label="Show password">
            👁️
          </button>
        </div>
        <span class="form-error" id="confirmPasswordError"></span>
      </div>

      <button type="submit" class="btn btn--primary btn--full" 
        id="registerBtn">
        Create Account
      </button>

    </form>

    <p class="auth-switch">
      Already have an account? 
      <a href="login.html" class="link link--primary">
        Sign in
      </a>
    </p>

  </div>

  <script type="module" src="js/pages/register.js"></script>
</body>
</html>
